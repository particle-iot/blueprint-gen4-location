introduction: |
  A location tracking application for Particle Gen 4 devices that intelligently combines
  GNSS, Wi-Fi, and cellular tower geolocation to provide robust positioning even in
  challenging environments.
description: |
  This tutorial demonstrates how to build a location tracking application using Particle
  Gen 4 devices with Quectel cellular modems. The firmware uses a non-blocking state machine
  to manage the location lifecycle and automatically falls back from GNSS to Wi-Fi/cell tower
  fusion when satellite visibility is poor. The architecture is designed for easy expansion
  with future features like motion detection, geofencing, and sleep management.
